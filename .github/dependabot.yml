version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      cargo:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: "/crates/grove-gui/ui"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      npm:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
