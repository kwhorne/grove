name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Release (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          # Intel macOS is intentionally not shipped: notarization on the
          # macos-13 runner routinely hangs, and demand is negligible. Intel
          # users can build from source.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Tauri system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            file

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: crates/grove-gui/ui/pnpm-lock.yaml

      - name: Build frontend
        working-directory: crates/grove-gui/ui
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Build CLI (grove) + tunnel server (grove-tunnel)
        run: cargo build --release -p grove-cli -p grove-tunnel --target ${{ matrix.target }}

      - name: Package CLI
        shell: bash
        run: |
          mkdir -p dist
          tar -C "target/${{ matrix.target }}/release" -czf \
            "dist/grove-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" grove grove-tunnel

      - name: Stage CLI as a Tauri sidecar
        shell: bash
        run: |
          mkdir -p crates/grove-gui/binaries
          ext=""; [ "${{ runner.os }}" = "Windows" ] && ext=".exe"
          cp "target/${{ matrix.target }}/release/grove${ext}" \
             "crates/grove-gui/binaries/grove-${{ matrix.target }}${ext}"

      # Swap the open-source Pro stub for the proprietary implementation so
      # official binaries ship the Pro features. Needs a read token for the
      # private repo; without it (forks, PRs) the build keeps the stub and
      # simply omits Pro — the free core is unaffected.
      - name: Inject Grove Pro (proprietary)
        shell: bash
        env:
          GROVE_PRO_SSH_KEY: ${{ secrets.GROVE_PRO_SSH_KEY }}
        run: |
          if [ -n "$GROVE_PRO_SSH_KEY" ]; then
            mkdir -p ~/.ssh
            printf '%s\n' "$GROVE_PRO_SSH_KEY" > ~/.ssh/grove_pro
            chmod 600 ~/.ssh/grove_pro
            export GIT_SSH_COMMAND="ssh -i ~/.ssh/grove_pro -o IdentitiesOnly=yes -o StrictHostKeyChecking=no"
            rm -rf crates/grove-pro
            git clone --depth 1 git@github.com:kwhorne/grove-pro.git crates/grove-pro
            rm -rf crates/grove-pro/.git ~/.ssh/grove_pro
            echo "Injected proprietary grove-pro."
          else
            echo "GROVE_PRO_SSH_KEY not set — building with the open-source stub (no Pro)."
          fi

      # Builds + signs the GUI, generates latest.json, creates/updates the
      # GitHub Release and uploads the bundles + updater artifacts.
      - name: Build & release GUI (Tauri)
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (minisign).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple code-signing + notarization (macOS). Empty on Linux runners,
          # in which case Tauri builds unsigned as before.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: crates/grove-gui
          tagName: ${{ github.ref_name }}
          releaseName: "Grove ${{ github.ref_name }}"
          releaseBody: |
            See the assets below to download. The macOS app is code-signed with a
            Developer ID and notarized by Apple, and auto-updates in place.

            Changelog: https://github.com/kwhorne/grove/blob/main/CHANGELOG.md
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          # macOS DMG bundling (bundle_dmg.sh) is occasionally flaky on CI; retry.
          retryAttempts: 2
          args: --target ${{ matrix.target }}

      - name: Attach CLI tarball to the release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" dist/*.tar.gz --clobber

  # tauri-action writes api.github.com asset URLs into latest.json, which the
  # updater downloads unauthenticated — and the GitHub API rate-limits those to
  # 60/hour per IP, so updates intermittently fail with 403. Rewrite them to the
  # public, un-rate-limited browser_download_url. Runs last, after every matrix
  # job has uploaded its slice of latest.json.
  finalize-updater:
    name: Fix updater download URLs
    needs: release
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Rewrite latest.json to direct download URLs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release download "$TAG" -R "$REPO" -p latest.json -D . --clobber
          gh api "repos/$REPO/releases/tags/$TAG" \
            --jq '.assets[] | "\(.id)\t\(.browser_download_url)"' > assets.tsv
          python3 - <<'PY'
          import json, os
          m = {}
          for line in open('assets.tsv'):
              line = line.strip()
              if not line:
                  continue
              aid, url = line.split('\t')
              m[aid] = url
          d = json.load(open('latest.json'))
          changed = False
          for plat, info in d.get('platforms', {}).items():
              aid = info['url'].rstrip('/').split('/')[-1]
              if aid in m and info['url'] != m[aid]:
                  info['url'] = m[aid]
                  changed = True
          json.dump(d, open('latest.json', 'w'), indent=2)
          print('updater urls rewritten' if changed else 'no changes needed')
          PY
          gh release upload "$TAG" latest.json -R "$REPO" --clobber
